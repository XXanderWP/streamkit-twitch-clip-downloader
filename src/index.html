<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twitch Clip &amp; VOD Downloader</title>
    <link rel="stylesheet" href="/data/styles.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="App">
    <div class="downloader">
      <header class="downloader__header">
        <div>
          <h1 class="downloader__title" data-i18n="title">Twitch Clip &amp; VOD Downloader</h1>
          <p class="downloader__subtitle" id="channel-label" data-i18n="loading">Loading…</p>
        </div>
        <div class="downloader__folder-row">
          <div class="downloader__folder" id="folder-label"></div>
          <button type="button" class="btn" id="open-folder-btn" hidden data-i18n="open_folder">Open folder</button>
        </div>
      </header>

      <section class="downloader__toolbar panel">
        <div class="toolbar-row">
          <label class="toolbar-row__label" for="channel-input" data-i18n="channel">Channel login</label>
          <input type="text" id="channel-input" class="toolbar-row__input" placeholder="your_channel" autocomplete="off" />
        </div>
      </section>

      <nav class="downloader__tabs" role="tablist">
        <button type="button" class="tab active" data-tab="clips" role="tab" data-i18n="tab_clips">Clips</button>
        <button type="button" class="tab" data-tab="videos" role="tab" data-i18n="tab_videos">VODs</button>
        <button type="button" class="tab" data-tab="url" role="tab" data-i18n="tab_url">By URL</button>
      </nav>

      <main class="downloader__content panel">
        <div class="tab-panels">
          <section class="tab-panel active" id="panel-clips" role="tabpanel">
            <details class="clip-filters" open>
              <summary class="clip-filters__summary" data-i18n="filters">Filters</summary>
              <div class="clip-filters__grid">
                <label class="clip-filters__field clip-filters__field--wide">
                  <span data-i18n="filter_title">Title contains</span>
                  <input type="text" id="filter-title" autocomplete="off" />
                </label>
                <label class="clip-filters__field">
                  <span data-i18n="filter_date_from">Date from</span>
                  <input type="date" id="filter-date-from" />
                </label>
                <label class="clip-filters__field">
                  <span data-i18n="filter_date_to">Date to</span>
                  <input type="date" id="filter-date-to" />
                </label>
                <label class="clip-filters__field">
                  <span data-i18n="filter_min_views">Min views</span>
                  <input type="number" id="filter-min-views" min="0" step="1" />
                </label>
                <label class="clip-filters__field">
                  <span data-i18n="filter_max_views">Max views</span>
                  <input type="number" id="filter-max-views" min="0" step="1" />
                </label>
                <label class="clip-filters__field">
                  <span data-i18n="filter_include_creators">Include creators</span>
                  <input type="text" id="filter-include-creators" placeholder="user1, user2" autocomplete="off" />
                </label>
                <label class="clip-filters__field">
                  <span data-i18n="filter_exclude_creators">Exclude creators</span>
                  <input type="text" id="filter-exclude-creators" placeholder="user1, user2" autocomplete="off" />
                </label>
              </div>
              <div class="clip-filters__actions">
                <button type="button" class="btn" id="filter-clear-btn" data-i18n="clear_filters">Clear filters</button>
              </div>
              <p class="clip-filters__hint" data-i18n="filter_hint">
                Twitch API filters by date range. Title, views, and creators are filtered locally after loading.
              </p>
            </details>
            <div class="tab-panel__toolbar">
              <button type="button" class="btn tab-reload-btn" data-i18n="reload">Reload</button>
              <button type="button" class="btn btn-primary" id="clips-download-all" hidden data-i18n="download_all">
                Download all
              </button>
            </div>
            <div class="list" id="clips-list"></div>
          </section>

          <section class="tab-panel" id="panel-videos" role="tabpanel" hidden>
            <div class="tab-panel__toolbar">
              <button type="button" class="btn tab-reload-btn" data-i18n="reload">Reload</button>
              <button type="button" class="btn btn-primary" id="videos-download-all" hidden data-i18n="download_all">
                Download all
              </button>
            </div>
            <div class="list" id="videos-list"></div>
          </section>

          <section class="tab-panel" id="panel-url" role="tabpanel" hidden>
            <div class="toolbar-row toolbar-row--url">
              <label class="toolbar-row__label" for="url-input" data-i18n="url_label">Twitch clip or VOD URL</label>
              <input
                type="text"
                id="url-input"
                class="toolbar-row__input"
                placeholder="https://www.twitch.tv/videos/… or https://clips.twitch.tv/…"
                autocomplete="off"
              />
              <button type="button" class="btn btn-primary toolbar-row__btn" id="url-download-btn" data-i18n="download">
                Download
              </button>
            </div>
          </section>
        </div>

        <p class="message message--error" id="error-message" hidden></p>
        <p class="message message--info" id="empty-message" hidden data-i18n="empty">No items found.</p>
      </main>

      <section class="downloader__downloads panel" id="downloads-panel" hidden>
        <h2 class="downloads__title" data-i18n="downloads">Downloads</h2>
        <div class="downloads-list" id="downloads-list"></div>
      </section>
    </div>

    <div class="media-modal" id="media-modal" hidden>
      <div class="media-modal__backdrop" id="media-modal-backdrop"></div>
      <div class="media-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="media-modal-title">
        <button type="button" class="media-modal__close" id="media-modal-close" aria-label="Close">&times;</button>
        <div class="media-modal__body">
          <div class="media-modal__player">
            <iframe id="media-modal-iframe" title="Twitch player" allowfullscreen></iframe>
          </div>
          <div class="media-modal__info" id="media-modal-info"></div>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
