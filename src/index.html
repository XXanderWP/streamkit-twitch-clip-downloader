<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twitch Clip &amp; VOD Downloader</title>
    <link rel="stylesheet" href="/data/styles.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="App">
    <div class="downloader">
      <header class="downloader__header">
        <div>
          <h1 class="downloader__title" data-i18n="title">Twitch Clip &amp; VOD Downloader</h1>
          <p class="downloader__subtitle" id="channel-label" data-i18n="loading">Loading…</p>
        </div>
        <div class="downloader__folder" id="folder-label"></div>
      </header>

      <section class="downloader__toolbar panel">
        <div class="toolbar-row">
          <label class="toolbar-row__label" for="channel-input" data-i18n="channel">Channel login</label>
          <input type="text" id="channel-input" class="toolbar-row__input" placeholder="your_channel" autocomplete="off" />
          <button type="button" class="btn btn-primary toolbar-row__btn" id="reload-btn" data-i18n="reload">Reload</button>
        </div>
      </section>

      <nav class="downloader__tabs" role="tablist">
        <button type="button" class="tab active" data-tab="clips" role="tab" data-i18n="tab_clips">Clips</button>
        <button type="button" class="tab" data-tab="videos" role="tab" data-i18n="tab_videos">VODs</button>
        <button type="button" class="tab" data-tab="url" role="tab" data-i18n="tab_url">By URL</button>
      </nav>

      <main class="downloader__content panel">
        <div class="tab-panels">
          <section class="tab-panel active" id="panel-clips" role="tabpanel">
            <div class="tab-panel__toolbar">
              <button type="button" class="btn btn-primary" id="clips-download-all" hidden data-i18n="download_all">
                Download all
              </button>
            </div>
            <div class="list" id="clips-list"></div>
            <div class="pagination">
              <button type="button" class="btn" id="clips-more" hidden data-i18n="load_more">Load more</button>
            </div>
          </section>

          <section class="tab-panel" id="panel-videos" role="tabpanel" hidden>
            <div class="tab-panel__toolbar">
              <button type="button" class="btn btn-primary" id="videos-download-all" hidden data-i18n="download_all">
                Download all
              </button>
            </div>
            <div class="list" id="videos-list"></div>
            <div class="pagination">
              <button type="button" class="btn" id="videos-more" hidden data-i18n="load_more">Load more</button>
            </div>
          </section>

          <section class="tab-panel" id="panel-url" role="tabpanel" hidden>
            <div class="toolbar-row toolbar-row--url">
              <label class="toolbar-row__label" for="url-input" data-i18n="url_label">Twitch clip or VOD URL</label>
              <input
                type="text"
                id="url-input"
                class="toolbar-row__input"
                placeholder="https://www.twitch.tv/videos/… or https://clips.twitch.tv/…"
                autocomplete="off"
              />
              <button type="button" class="btn btn-primary toolbar-row__btn" id="url-download-btn" data-i18n="download">
                Download
              </button>
            </div>
          </section>
        </div>

        <p class="message message--error" id="error-message" hidden></p>
        <p class="message message--info" id="empty-message" hidden data-i18n="empty">No items found.</p>
      </main>

      <section class="downloader__downloads panel" id="downloads-panel" hidden>
        <h2 class="downloads__title" data-i18n="downloads">Downloads</h2>
        <div class="downloads-list" id="downloads-list"></div>
      </section>
    </div>
    <script src="app.js"></script>
  </body>
</html>
