name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build and publish addon release
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read versions
        id: versions
        run: |
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "manifest_version=${MANIFEST_VERSION}" >> "$GITHUB_OUTPUT"
          echo "package_version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"

          if [ "$MANIFEST_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Version mismatch: manifest.json=${MANIFEST_VERSION}, package.json=${PACKAGE_VERSION}"
            exit 1
          fi

          echo "version=${MANIFEST_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.versions.outputs.version }}"
          TAG="v${VERSION}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists, skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "No release for ${TAG}, build required."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.check.outputs.should_release == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.check.outputs.should_release == 'true'
        run: npm ci

      - name: Build addon
        if: steps.check.outputs.should_release == 'true'
        run: npm run build

      - name: Collect release assets
        if: steps.check.outputs.should_release == 'true'
        run: node scripts/collect-manifest-assets.mjs release

      - name: Package addon
        if: steps.check.outputs.should_release == 'true'
        run: |
          mkdir -p release-assets
          cp manifest.json release-assets/manifest.json
          ICON=$(node -p "require('./manifest.json').icon || ''")
          if [ -n "$ICON" ] && [ -f "release/$ICON" ]; then
            cp "release/$ICON" "release-assets/$ICON"
          elif [ -n "$ICON" ] && [ -f "$ICON" ]; then
            cp "$ICON" "release-assets/$ICON"
          fi
          cd release
          zip -r ../release-assets/main.zip .
          cd ..

      - name: List release files
        if: steps.check.outputs.should_release == 'true'
        id: files
        run: |
          FILES="release-assets/main.zip"$'\n'"release-assets/manifest.json"
          ICON=$(node -p "require('./manifest.json').icon || ''")
          if [ -n "$ICON" ] && [ -f "release-assets/$ICON" ]; then
            FILES="${FILES}"$'\n'"release-assets/${ICON}"
          fi
          {
            echo "list<<EOF"
            echo "$FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "$FILES"

      - name: Create GitHub release
        if: steps.check.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.versions.outputs.version }}
          name: v${{ steps.versions.outputs.version }}
          generate_release_notes: false
          body_path: .github/release-body.md
          files: ${{ steps.files.outputs.list }}

  sync:
    name: Sync addon to RocketMan catalog
    needs: release
    if: needs.release.outputs.should_release == 'true'
    uses: ./.github/workflows/sync.yml
    secrets: inherit